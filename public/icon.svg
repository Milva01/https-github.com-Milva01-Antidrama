<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aurora" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lines" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="100%" height="100%" fill="#020617"/>
  <!-- Glowing aurora back -->
  <circle cx="256" cy="256" r="240" fill="url(#aurora)"/>
  <!-- Minimalist robot interface body -->
  <rect x="128" y="140" width="256" height="232" rx="40" fill="#1e293b" stroke="url(#lines)" stroke-width="6"/>
  <!-- Glowing eye bar (Teal Aura) -->
  <rect x="168" y="210" width="176" height="48" rx="24" fill="#0f172a" stroke="#2dd4bf" stroke-width="3"/>
  <!-- Calming eyes -->
  <circle cx="212" cy="234" r="10" fill="#2dd4bf"/>
  <circle cx="300" cy="234" r="10" fill="#2dd4bf"/>
  <!-- Calm operative mouth line -->
  <path d="M226 295 H286" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <!-- Floating antenna / beacon -->
  <line x1="256" y1="140" x2="256" y2="90" stroke="url(#lines)" stroke-width="6"/>
  <circle cx="256" cy="80" r="12" fill="#2dd4bf"/>
</svg>
